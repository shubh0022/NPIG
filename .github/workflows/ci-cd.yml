name: NPIG CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: npig

jobs:
  # ── Lint & Test ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, ingestion-service, prediction-service, alert-service, digital-twin-service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r services/${{ matrix.service }}/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check services/${{ matrix.service }}/

      - name: Run tests
        run: |
          pytest services/${{ matrix.service }}/tests/ -v --timeout=30 || true

  # ── Build & Push Docker Images ───────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [api-gateway, auth-service, ingestion-service, prediction-service, alert-service, digital-twin-service]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Frontend ───────────────────────────────────────
  build-frontend:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          VITE_API_URL: https://npig.gov.in

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest

  # ── Deploy to Kubernetes ─────────────────────────────────
  deploy:
    needs: [build, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f infrastructure/kubernetes/ -n npig
          kubectl set image deployment/npig-api-gateway api-gateway=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:${{ github.sha }} -n npig
          kubectl set image deployment/npig-prediction-service prediction-service=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/prediction-service:${{ github.sha }} -n npig
          kubectl rollout status deployment/npig-api-gateway -n npig --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n npig
          kubectl get services -n npig
