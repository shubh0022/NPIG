global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: /metrics

  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8001']

  - job_name: 'ingestion-service'
    static_configs:
      - targets: ['ingestion-service:8002']

  - job_name: 'prediction-service'
    static_configs:
      - targets: ['prediction-service:8003']

  - job_name: 'alert-service'
    static_configs:
      - targets: ['alert-service:8004']

  - job_name: 'digital-twin-service'
    static_configs:
      - targets: ['digital-twin-service:8005']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9999']
