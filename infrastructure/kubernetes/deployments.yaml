apiVersion: apps/v1
kind: Deployment
metadata:
  name: npig-api-gateway
  namespace: npig
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: npig/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:8001"
            - name: INGEST_SERVICE_URL
              value: "http://ingestion-service:8002"
            - name: PREDICT_SERVICE_URL
              value: "http://prediction-service:8003"
            - name: ALERT_SERVICE_URL
              value: "http://alert-service:8004"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: npig
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: npig-api-gateway-hpa
  namespace: npig
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: npig-api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: npig-prediction-service
  namespace: npig
spec:
  replicas: 4
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      containers:
        - name: prediction-service
          image: npig/prediction-service:latest
          ports:
            - containerPort: 8003
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /predict/health
              port: 8003
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: npig
spec:
  selector:
    app: prediction-service
  ports:
    - port: 8003
      targetPort: 8003
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: npig-ingress
  namespace: npig
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - npig.gov.in
      secretName: npig-tls
  rules:
    - host: npig.gov.in
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: npig-frontend
                port:
                  number: 80
